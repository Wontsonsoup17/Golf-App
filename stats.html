<!DOCTYPE html>
<html lang="en">
<head>
<style>html,body{background:#0a0f0d}</style>
<script>
(function(){var v='175';var k='app_v';var s=localStorage.getItem(k);if(s&&s!==v){localStorage.setItem(k,v);window.location.replace(window.location.pathname+'?_='+Date.now());return;}localStorage.setItem(k,v);})();
</script>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0f0d">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Stats - Westchester Golf</title>
<link rel="stylesheet" href="shared.css?v=175">
</head>
<body>

<div class="header">
  <h1>Leaderboard</h1>
  <div class="subtitle">Community rankings</div>
</div>

<div id="broadcastBanner"></div>
<div id="activeRoundBanner"></div>

<div class="main">
  <div class="stat-grid" id="statGrid"></div>
  <div id="leaderboardSection">
    <div class="waiting-players"><span class="spinner"></span> Loading stats...</div>
  </div>
</div>

<nav class="bottom-nav" id="bottomNav"></nav>

<script src="firebase-config.js?v=175"></script>
<script src="shared.js?v=175"></script>
<script src="firebase-sync.js?v=175"></script>
<script>
  requireAuth(function(user) {
    renderBottomNav('stats');
    renderActiveRoundBanner();
    renderBroadcastBanner();

    // Load from Firebase
    fbLoadRounds(user.uid).then(rounds => {
      renderStats(rounds);
    }).catch(() => {
      renderStats(loadRounds());
    });

    function renderStats(rounds) {
      if (!rounds.length) {
        document.getElementById('statGrid').innerHTML = '';
        document.getElementById('leaderboardSection').innerHTML = `<div class="empty-state"><div class="icon">&#128202;</div><p>Play some rounds to see your stats!<br><a href="index.html">Get started</a></p></div>`;
        return;
      }

      const totalRounds = rounds.length;
      const allPlayers = new Set();
      rounds.forEach(r => r.players.forEach(p => allPlayers.add(p)));
      const courseCount = new Set(rounds.map(r => r.courseId)).size;

      let bestScore = Infinity, bestPlayer = '';
      rounds.forEach(r => r.players.forEach(p => {
        const total = r.scores[p].reduce((a,b)=>a+b,0);
        const played = r.scores[p].filter(s=>s>0).length;
        if (played >= 9 && total > 0 && total < bestScore) { bestScore = total; bestPlayer = p; }
      }));

      document.getElementById('statGrid').innerHTML = `
        <div class="stat-box"><div class="stat-value">${totalRounds}</div><div class="stat-label">Rounds</div></div>
        <div class="stat-box"><div class="stat-value">${courseCount}</div><div class="stat-label">Courses</div></div>
        <div class="stat-box"><div class="stat-value">${allPlayers.size}</div><div class="stat-label">Players</div></div>
        <div class="stat-box"><div class="stat-value">${bestScore < Infinity ? bestScore : '-'}</div><div class="stat-label">Best${bestPlayer ? ' ('+bestPlayer+')' : ''}</div></div>
      `;

      // Leaderboard — ranked by avg score-to-par for holes played
      function parPlayed(r, p) {
        if (!r.holePars) return r.par;
        return r.holePars.reduce(function(acc, hp, i) { return acc + (r.scores[p][i] > 0 ? hp : 0); }, 0);
      }
      function fmtToPar(n) { return n === 0 ? 'E' : (n > 0 ? '+' + n : n.toString()); }

      const ps = {};
      rounds.forEach(r => r.players.forEach(p => {
        const total = r.scores[p].reduce((a,b)=>a+b,0);
        const played = r.scores[p].filter(s=>s>0).length;
        if (total > 0 && played >= 9) {
          const pp = parPlayed(r, p);
          const toPar = total - pp;
          if (!ps[p]) ps[p] = { rounds:0, totalScore:0, totalPar:0, wins:0, bestToPar:Infinity };
          ps[p].rounds++;
          ps[p].totalScore += total;
          ps[p].totalPar += pp;
          if (toPar < ps[p].bestToPar) ps[p].bestToPar = toPar;
        }
      }));

      // Win = lowest score-to-par in each round
      rounds.forEach(r => {
        let minToPar = Infinity, winners = [];
        r.players.forEach(p => {
          const t = r.scores[p].reduce((a,b)=>a+b,0);
          const played = r.scores[p].filter(s=>s>0).length;
          if (t > 0 && played >= 9) {
            const tp = t - parPlayed(r, p);
            if (tp < minToPar) { minToPar = tp; winners = [p]; }
            else if (tp === minToPar) winners.push(p);
          }
        });
        winners.forEach(w => { if (ps[w]) ps[w].wins++; });
      });

      const sorted = Object.entries(ps)
        .map(([name,s]) => {
          const avgToPar = (s.totalScore - s.totalPar) / s.rounds;
          return { name, avgToPar, avgToParStr: (avgToPar >= 0 ? '+' : '') + avgToPar.toFixed(1), rounds:s.rounds, wins:s.wins, bestToPar:s.bestToPar };
        })
        .sort((a,b) => a.avgToPar - b.avgToPar);

      let lbHtml = '<div class="leaderboard"><h3>Player Leaderboard</h3>';
      if (!sorted.length) {
        lbHtml += '<p style="color:var(--text-muted);font-size:13px">Complete a round with 9+ holes.</p>';
      } else {
        sorted.forEach((p, i) => {
          const rc = i===0?'':i===1?'r2':i===2?'r3':'r4';
          lbHtml += `
            <div class="lb-row">
              <div class="lb-rank ${rc}">${i+1}</div>
              <span class="lb-name">${isAdmin(p.name) ? '<span class="admin-name">' + p.name + '</span>' + adminBadge(p.name, 12) : p.name}</span>
              <span class="lb-meta">${p.rounds}R &bull; ${p.wins}W<br>Best: ${fmtToPar(p.bestToPar)}</span>
              <span class="lb-stat">${p.avgToParStr} avg</span>
            </div>
          `;
        });
      }
      lbHtml += '</div>';
      document.getElementById('leaderboardSection').innerHTML = lbHtml;
    }
  });
</script>
</body>
</html>
